<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
body {
  background: #faf7f2;

}
/* iPhoneノッチ対応 */
nav { padding-top: env(safe-area-inset-top); }

/* スプラッシュ画面 */
#splash {
  position: fixed; inset: 0; background: #1a1a1a;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; transition: opacity 0.4s ease;
}
#splash.hidden { opacity: 0; pointer-events: none; }
#splash-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 52px; font-weight: 800; color: white; line-height: 1;
}
#splash-red { color: #c8102e; }
#splash-sub {
  font-family: 'Shippori Mincho', serif;
  font-size: 12px; letter-spacing: 0.3em; color: rgba(255,255,255,0.4);
  margin-top: 12px;
}
#splash-bar {
  width: 60px; height: 3px; background: #c8102e; margin-top: 32px;
  animation: loading 1.2s ease-in-out infinite;
}
@keyframes loading {
  0%,100% { transform: scaleX(0.3); opacity: 0.4; }
  50% { transform: scaleX(1); opacity: 1; }
}
@keyframes heroPulse {
  0%,100% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.04); filter: brightness(1.08); }
}
</style>

<div id="splash">

  <div id="open-hint-inner" style="max-width:520px;margin:40px auto;background:white;border:2px solid #1a1a1a;padding:24px;line-height:1.7;">
    <div id="open-hint-title" style="font-size:22px;font-weight:800;margin-bottom:12px;">宅建アプリの開き方</div>
    <div id="open-hint-body"></div>
    <button onclick="location.reload()" style="margin-top:16px;padding:10px 16px;border:1px solid #1a1a1a;background:#1a1a1a;color:white;font-weight:700;cursor:pointer;">再読み込み</button>
  </div>
</div>
<script>
(function(){
  var hint=document.getElementById('open-hint');
  var body=document.getElementById('open-hint-body');
  var title=document.getElementById('open-hint-title');
  var hosted=/^https?:$/i.test(location.protocol) && /github\.io|netlify\.app|localhost|127\.0\.0\.1/i.test(location.host);
  var mobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  var loadMs=hosted?(mobile?90000:60000):60000;
  function hideHint(){ if(hint) hint.style.display='none'; }
  function fillHostedSlow(){
    if(title) title.textContent='読み込みに時間がかかっています';
    if(body) body.innerHTML=[
      '<p style="font-size:14px;color:#444;margin-bottom:12px;">読み込みに時間がかかる場合は<b>30秒〜1分</b>待ってから「再読み込み」を押してください。</p>',
      '<p style="font-size:14px;color:#222;margin-bottom:12px;"><b>すぐ使いたい場合</b>は、いつも使っている Netlify のURLを開いてください：</p>',
      '<p style="margin-bottom:8px;"><a href="https://classy-kleicha-030356.netlify.app/index.html" style="color:#1a5ca8;font-weight:700;word-break:break-all;">classy-kleicha-030356.netlify.app/index.html</a></p>',
      '<p style="font-size:14px;color:#222;margin-bottom:8px;"><b>バックアップ復元だけ</b>なら軽量ページ（すぐ開きます）：</p>',
      '<p style="margin-bottom:12px;"><a href="./restore.html" style="color:#1a5ca8;font-weight:700;">restore.html（バックアップ復元）</a> · <a href="./start.html" style="color:#1a5ca8;font-weight:700;">start.html（接続テスト）</a></p>',
      '<p style="font-size:13px;color:#666;">バックアップJSONの復元も、上の restore.html または Netlify のホーム画面下「データのバックアップ・復元」から行えます。</p>'
    ].join('');
  }
  function fillLocal(){
    if(title) title.textContent='宅建アプリの開き方';
    if(body) body.innerHTML=[
      '<p style="font-size:14px;color:#444;margin-bottom:16px;">HTMLを直接ダブルクリックしたか、読み込みに失敗した可能性があります。Netlify では <b>/index.html</b> のURLで開いてください。</p>',
      '<ol style="font-size:14px;color:#222;padding-left:20px;margin-bottom:16px;">',
      '<li style="margin-bottom:8px;"><b>ローカルで開く.command</b> をダブルクリック（Downloads/宅建アプリ/）</li>',
      '<li style="margin-bottom:8px;">Netlify なら <b>https://あなたのサイト.netlify.app/index.html</b></li>',
      '<li style="margin-bottom:8px;">正しいURLは <b>http://127.0.0.1:18765/index.html</b></li>',
      '</ol>',
      '<p style="font-size:13px;color:#666;margin-bottom:12px;">オンラインで使う: <a href="https://classy-kleicha-030356.netlify.app/index.html" style="color:#1a5ca8;font-weight:700;">Netlifyで開く</a></p>'
    ].join('');
  }
  function showHint(reason){
    if(!hint) return;
    if(hosted) fillHostedSlow(); else fillLocal();
    hint.style.display='block';
    var splash=document.getElementById('splash');
    if(splash) splash.classList.add('hidden');
  }
  if(location.protocol==='file:') showHint('file');
  window.addEventListener('error', function(e){
    var root=document.getElementById('root');
    if(!root || root.childElementCount) return;
    if(e && e.message && /SyntaxError|Unexpected token|Invalid or unexpected token/i.test(e.message)) showHint('syntax');
  });
  var root=document.getElementById('root');
  if(root){
    var obs=new MutationObserver(function(){
      if(root.childElementCount){ hideHint(); obs.disconnect(); }
    });
    obs.observe(root,{childList:true});
  }
  setTimeout(function(){
    var r=document.getElementById('root');
    if(r && !r.childElementCount) showHint('timeout');
  }, loadMs);
  setTimeout(function(){
    var sub=document.getElementById('splash-sub');
    if(!sub) return;
    if(hosted && mobile) sub.textContent='読み込み中…（30秒ほどかかることがあります）';
    else if(hosted) sub.textContent='読み込み中…（初回は30〜60秒かかることがあります）';
    else sub.textContent='読み込み中…（初回は30〜60秒かかることがあります。そのままお待ちください）';
  }, 3000);
})();
</script>

<script>
(function () {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.getRegistrations().then(function (regs) {
    regs.forEach(function (reg) { reg.unregister(); });
  });
  if ('caches' in window) {
    caches.keys().then(function (keys) {
      keys.forEach(function (k) { caches.delete(k); });
    });
  }
})();
</script>
